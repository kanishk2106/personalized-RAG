name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff

      - name: Lint
        run: |
          ruff check .

      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/
          
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./pdf_extractor/Dockerfile
          push: false
          tags: local/rag_pdf_extraction:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container starts
        run: |
          docker build -f ./pdf_extractor/Dockerfile -t local/rag_pdf_extraction:ci .
          docker run -d --name rag_pdf_test -p 8000:8000 local/rag_pdf_extraction:ci
          sleep 10
          docker logs rag_pdf_test --tail=100 || true
          docker rm -f rag_pdf_test || true